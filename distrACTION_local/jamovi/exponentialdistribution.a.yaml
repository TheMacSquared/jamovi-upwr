---
name:  ExponentialDistribution
title: Rozkład wykładniczy
menuGroup: distrACTION
menuSubgroup: Rozkłady ciągłe
version: '1.0.0'
jas: '1.2'

options:
    - title: Oblicz prawdopodobieństwo
      name: DistributionFunction
      type: Bool
      default: FALSE

    - title: Oblicz kwantyl(e)
      name: QuantileFunction
      type: Bool
      default: FALSE

    - name: QuantileFunctionType
      title: Tryb kwantyli
      type: List
      options:
        - title: kwantyle przedziału centralnego
          name: central
        - title: kwantyl kumulatywny
          name: cumulative
      default: central

    - name: DistributionFunctionType
      title: Tryb dystrybuanty
      type: List
      options:
        - title: P(X ≤ x1)
          name:  lower
        - title: P(X ≥ x1)
          name:  higher
        - title: P(x1 ≤ X ≤ x2)
          name: interval
      default: lower

    - name: x1
      title: x1 =
      type: Number
      default: 1

    - name: p
      title: p =
      type: Number
      default: 0.5
      min: 0
      max: 1

    - name: x2
      title: x2 =
      type: Number
      default: 2

    - name: dp1
      title: Intensywność (λ) =
      type: Number
      default: 1
      min: 0.0001

    - title: Pokaż wartość oczekiwaną E[X]
      name: showMean
      type: Bool
      default: FALSE

    - title: Pokaż wariancję Var[X]
      name: showVariance
      type: Bool
      default: FALSE
...
