title: CI dla korelacji
name: cicorrelation
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    suggested:
      - continuous
    permitted:
      - numeric
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Zmienna 1
        children:
          - type: VariablesListBox
            name: var1
            isTarget: true
            maxItemCount: 1
      - type: TargetLayoutBox
        label: Zmienna 2
        children:
          - type: VariablesListBox
            name: var2
            isTarget: true
            maxItemCount: 1
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: LayoutBox
        cell:
          column: 0
          row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: Opcje
            children:
              - type: ComboBox
                name: method
                label: Metoda
              - type: TextBox
                name: ciWidth
                label: Poziom ufnosci
                suffix: '%'
                format: number
      - type: LayoutBox
        cell:
          column: 1
          row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: Wykresy
            children:
              - type: CheckBox
                name: showPlot
                label: Error bar plot
