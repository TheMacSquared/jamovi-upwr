---
name:  bootCI
title: "Bootstrapowy CI dla miary centralnej"
jrs:   '1.1'

items:
    - name: ciTable
      title: "Bootstrapowy CI dla miary centralnej"
      type: Table
      rows: (dep)
      clearWith:
          - nBoot
          - ciWidth
          - seed
          - ciMethod
          - stat
          - trimProp
      columns:
          - name: var
            title: Zmienna
            type: text
          - name: mean
            title: "Estymata"
            type: number
          - name: seBoot
            title: "Błąd std. bootstrap"
            type: number
          - name: ciLower
            title: "Dolna granica CI"
            type: number
          - name: ciUpper
            title: "Górna granica CI"
            type: number
          - name: bias
            title: "Obciążenie"
            type: number
          - name: n
            title: N
            type: integer

    - name: classicalTable
      title: "Test klasyczny (t-test dla jednej próbki)"
      type: Table
      visible: (showClassical && stat:mean)
      rows: (dep)
      clearWith:
          - nBoot
          - ciWidth
          - stat
      columns:
          - name: var
            title: Zmienna
            type: text
          - name: t
            title: "Statystyka t"
            type: number
          - name: df
            title: df
            type: number
          - name: p
            title: p
            type: number
            format: zto,pvalue
          - name: ciLowerClass
            title: "Dolna granica CI"
            type: number
          - name: ciUpperClass
            title: "Górna granica CI"
            type: number

    - name: plots
      title: "Rozkład bootstrapowy"
      type: Array
      items: (dep)
      clearWith:
          - nBoot
          - ciWidth
          - seed
          - ciMethod
          - stat
          - trimProp
      template:
          title: "Rozkład bootstrapowy — $key"
          type: Image
          width: 500
          height: 350
          renderFun: .plot
...
