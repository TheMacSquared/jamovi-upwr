---
name:  bootCI
title: "Bootstrapowy przedział ufności dla średniej"
jrs:   '1.1'

items:
    - name: ciTable
      title: "Bootstrapowy przedział ufności dla średniej"
      type: Table
      rows: (dep)
      clearWith:
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      columns:
          - name: var
            title: Zmienna
            type: text
          - name: mean
            title: "Średnia"
            type: number
          - name: seBoot
            title: "Błąd std. bootstrap"
            type: number
          - name: ciLower
            title: "Dolna granica PU"
            type: number
          - name: ciUpper
            title: "Górna granica PU"
            type: number
          - name: bias
            title: "Obciążenie"
            type: number
          - name: n
            title: N
            type: integer

    - name: classicalTable
      title: "Test klasyczny (t-test dla jednej próbki)"
      type: Table
      visible: (showClassical)
      rows: (dep)
      clearWith:
          - nBoot
          - ciWidth
      columns:
          - name: var
            title: Zmienna
            type: text
          - name: t
            title: "Statystyka t"
            type: number
          - name: df
            title: df
            type: number
          - name: p
            title: p
            type: number
            format: zto,pvalue
          - name: ciLowerClass
            title: "Dolna granica PU"
            type: number
          - name: ciUpperClass
            title: "Górna granica PU"
            type: number

    - name: plots
      title: "Rozkład bootstrapowy"
      type: Array
      items: (dep)
      clearWith:
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      template:
          title: "Rozkład bootstrapowy — $key"
          type: Image
          width: 500
          height: 350
          renderFun: .plot
...
