title: Bootstrapowy CI dla miary centralnej
name: bootCI
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Zmienne zależne
        children:
          - type: VariablesListBox
            name: dep
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: stat
      - type: TextBox
        name: trimProp
        format: number
        enable: (stat:trimmed)
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: nBoot
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ciWidth
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showClassical
        enable: (stat:mean)
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: seed
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: ciMethod
