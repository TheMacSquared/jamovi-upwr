title: Bootstrapowy PU dla prob zaleznych
name: bootPaired
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Zmienna 1 (przed / warunek A)
        children:
          - type: VariablesListBox
            name: pair1
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Zmienna 2 (po / warunek B)
        children:
          - type: VariablesListBox
            name: pair2
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: nBoot
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ciWidth
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: seed
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: ciMethod
