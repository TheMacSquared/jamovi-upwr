---
name:  bootMultiGroup
title: "Bootstrapowe PU per grupa"
jrs:   '1.1'

items:
    - name: groupTable
      title: "Bootstrapowe przedziały ufności per grupa"
      type: Table
      clearWith:
          - dep
          - group
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      columns:
          - name: var
            title: Zmienna
            type: text
            combineBelow: true
          - name: group
            title: Grupa
            type: text
          - name: n
            title: N
            type: integer
          - name: mean
            title: "Średnia"
            type: number
          - name: seBoot
            title: "Błąd std. bootstrap"
            type: number
          - name: ciLower
            title: "Dolna granica PU"
            type: number
          - name: ciUpper
            title: "Górna granica PU"
            type: number

    - name: plots
      title: "Rozkłady bootstrapowe"
      type: Array
      items: (dep)
      clearWith:
          - dep
          - group
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      template:
          title: "Rozkład bootstrapowy — $key"
          type: Image
          width: 500
          height: 350
          renderFun: .plot
...
