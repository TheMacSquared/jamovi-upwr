title: Bootstrapowy CI dla sredniej ucietej
name: bootTrimmed
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Zmienne zależne
        children:
          - type: VariablesListBox
            name: dep
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: trimProp
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: nBoot
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: ciWidth
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: seed
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: ciMethod
