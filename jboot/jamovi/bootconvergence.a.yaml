---
name:  bootConvergence
title: "Zbieżność bootstrapu"
menuGroup: jboot
menuSubgroup: Dydaktyka
version: '0.1.0'
jas: '1.2'

description:
    R:
        usage: >
            Analiza wpływu liczby prób bootstrapowych (B) na stabilność wyników.

options:
    - name: data
      type: Data

    - name: dep
      title: Zmienna
      type: Variable
      suggested:
        - continuous
      permitted:
        - numeric

    - name: ciWidth
      title: "Poziom ufności (%)"
      type: Number
      default: 95
      min: 50
      max: 99.9

    - name: seed
      title: "Ziarno losowości"
      type: Integer
      default: 42
      min: 1
      max: 999999
...
