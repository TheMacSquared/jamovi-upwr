---
name:  bootMedian
title: "Bootstrapowy CI dla mediany"
jrs:   '1.1'

items:
    - name: medianTable
      title: "Bootstrapowy CI dla mediany"
      type: Table
      rows: (dep)
      clearWith:
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      columns:
          - name: var
            title: Zmienna
            type: text
          - name: median
            title: Mediana
            type: number
          - name: seBoot
            title: "Błąd std. bootstrap"
            type: number
          - name: ciLower
            title: "Dolna granica CI"
            type: number
          - name: ciUpper
            title: "Górna granica CI"
            type: number
          - name: n
            title: N
            type: integer

    - name: plots
      title: "Rozkład bootstrapowy"
      type: Array
      items: (dep)
      clearWith:
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      template:
          title: "Rozkład bootstrapowy — $key"
          type: Image
          width: 500
          height: 350
          renderFun: .plot
...
