            title: "Wylosowane indeksy"
            type: text
          - name: values
            title: "Wylosowane wartości"
            type: text
          - name: mean
            title: "Średnia"
            type: number

    - name: summaryTable
      title: "Podsumowanie bootstrapu"
      type: Table
      clearWith:
          - dep
          - nBoot
          - seed
          - ciWidth
      columns:
          - name: stat
            title: "Statystyka"
            type: text
          - name: value
            title: "Wartość"
            type: number
