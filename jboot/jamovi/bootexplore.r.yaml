---
name:  bootExplore
title: "Jak działa bootstrap"
jrs:   '1.1'

items:
    - name: origTable
      title: "Dane oryginalne — podsumowanie"
      type: Table
      clearWith:
          - dep
      columns:
          - name: stat
            title: "Statystyka"
            type: text
          - name: value
            title: "Wartość"
            type: number

    - name: samplesTable
      title: "Próby bootstrapowe"
      type: Table
      clearWith:
          - dep
          - nBoot
          - seed
      columns:
          - name: sample
            title: "Nr próby"
            type: integer
          - name: indices
            title: "Wylosowane indeksy"
            type: text
          - name: values
            title: "Wylosowane wartości"
            type: text
          - name: mean
            title: "Średnia"
            type: number

    - name: summaryTable
      title: "Podsumowanie bootstrapu"
      type: Table
      clearWith:
          - dep
          - nBoot
          - seed
          - ciWidth
      columns:
          - name: stat
            title: "Statystyka"
            type: text
          - name: value
            title: "Wartość"
            type: number

    - name: convTable
      title: "Wpływ liczby B na CI"
      type: Table
      visible: (showConvergence)
      clearWith:
          - dep
          - ciWidth
          - seed
      columns:
          - name: b
            title: B
            type: integer
          - name: seBoot
            title: "Błąd std. bootstrap"
            type: number
          - name: ciLower
            title: "Dolna granica CI"
            type: number
          - name: ciUpper
            title: "Górna granica CI"
            type: number
          - name: ciWidthV
            title: "Szerokość CI"
            type: number

    - name: convPlot
      title: "Zbieżność CI"
      type: Image
      visible: (showConvergence)
      width: 550
      height: 400
      clearWith:
          - dep
          - ciWidth
          - seed
      renderFun: .convPlot
...
