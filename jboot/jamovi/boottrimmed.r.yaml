---
name:  bootTrimmed
title: "Bootstrapowy CI dla średniej uciętej"
jrs:   '1.1'

items:
    - name: trimTable
      title: "Bootstrapowy CI dla średniej uciętej"
      type: Table
      rows: (dep)
      clearWith:
          - trimProp
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      columns:
          - name: var
            title: Zmienna
            type: text
          - name: trimMean
            title: "Średnia ucięta"
            type: number
          - name: mean
            title: "Średnia"
            type: number
          - name: seBoot
            title: "Błąd std. bootstrap"
            type: number
          - name: ciLower
            title: "Dolna granica CI"
            type: number
          - name: ciUpper
            title: "Górna granica CI"
            type: number
          - name: n
            title: N
            type: integer

    - name: plots
      title: "Rozkład bootstrapowy"
      type: Array
      items: (dep)
      clearWith:
          - trimProp
          - nBoot
          - ciWidth
          - seed
          - ciMethod
      template:
          title: "Rozkład bootstrapowy — $key"
          type: Image
          width: 500
          height: 350
          renderFun: .plot
...
