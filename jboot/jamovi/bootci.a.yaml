---
name:  bootCI
title: "Bootstrapowy CI dla miary centralnej"
menuGroup: jboot
version: '0.2.0'
jas: '1.2'

description:
    R:
        usage: >
            Bootstrapowy CI dla miary centralnej (średniej, mediany, średniej uciętej).

options:
    - name: data
      type: Data

    - name: dep
      title: Zmienne zależne
      type: Variables
      suggested:
        - continuous
      permitted:
        - numeric

    - name: stat
      title: "Miara centralna"
      type: List
      options:
        - name: mean
          title: Średnia
        - name: median
          title: Mediana
        - name: trimmed
          title: "Średnia ucięta"
      default: mean

    - name: trimProp
      title: "Proporcja ucięcia"
      type: Number
      default: 0.1
      min: 0.0
      max: 0.49

    - name: nBoot
      title: Liczba prób bootstrapowych
      type: Integer
      default: 1000
      min: 100
      max: 100000

    - name: ciWidth
      title: Poziom ufności (%)
      type: Number
      default: 95
      min: 50
      max: 99.9

    - name: showClassical
      title: "Pokaż wynik testu klasycznego (tylko dla średniej)"
      type: Bool
      default: false

    - name: seed
      title: "Ziarno losowości (0 = losowe)"
      type: Integer
      default: 0
      min: 0
      max: 999999

    - name: ciMethod
      title: "Metoda CI"
      type: List
      options:
        - name: perc
          title: Percentylowy
        - name: bca
          title: "BCa (skorygowany)"
        - name: basic
          title: "Bazowy (basic)"
      default: perc
...
