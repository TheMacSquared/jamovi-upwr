---
name:  bootExplore
title: "Eksploracja bootstrapu krok po kroku"
menuGroup: jboot
menuSubgroup: Dydaktyka
version: '0.1.0'
jas: '1.2'

description:
    R:
        usage: >
            Krokowa eksploracja procesu bootstrapu dla celów dydaktycznych.

options:
    - name: data
      type: Data

    - name: dep
      title: Zmienna
      type: Variable
      suggested:
        - continuous
      permitted:
        - numeric

    - name: nBoot
      title: "Liczba prób bootstrapowych"
      type: Integer
      default: 10
      min: 1
      max: 50

    - name: ciWidth
      title: "Poziom ufności (%)"
      type: Number
      default: 95
      min: 50
      max: 99.9

    - name: seed
      title: "Ziarno losowości"
      type: Integer
      default: 42
      min: 1
      max: 999999
...
