---
name:  bootExplore
title: "Jak działa bootstrap"
menuGroup: jboot
menuSubgroup: Dydaktyka
version: '0.2.0'
jas: '1.2'

description:
    R:
        usage: >
            Dydaktyczna analiza procesu bootstrapu: eksploracja krok po kroku
            oraz zbieżność CI przy rosnącej liczbie prób B.

options:
    - name: data
      type: Data

    - name: dep
      title: Zmienna
      type: Variable
      suggested:
        - continuous
      permitted:
        - numeric

    - name: nBoot
      title: "Liczba prób bootstrapowych (dla eksploracji)"
      type: Integer
      default: 10
      min: 1
      max: 50

    - name: ciWidth
      title: "Poziom ufności (%)"
      type: Number
      default: 95
      min: 50
      max: 99.9

    - name: seed
      title: "Ziarno losowości"
      type: Integer
      default: 42
      min: 1
      max: 999999

    - name: showConvergence
      title: "Pokaż zbieżność (wpływ liczby B)"
      type: Bool
      default: false
...
