---
name:  bootConvergence
title: "Zbieżność bootstrapu"
jrs:   '1.1'

items:
    - name: convTable
      title: "Wpływ liczby B na CI"
      type: Table
      clearWith:
          - dep
          - ciWidth
          - seed
      columns:
          - name: b
            title: B
            type: integer
          - name: seBoot
            title: "Błąd std. bootstrap"
            type: number
          - name: ciLower
            title: "Dolna granica CI"
            type: number
          - name: ciUpper
            title: "Górna granica CI"
            type: number
          - name: ciWidth
            title: "Szerokość CI"
            type: number

    - name: plots
      title: "Zbieżność CI"
      type: Image
      width: 550
      height: 400
      clearWith:
          - dep
          - ciWidth
          - seed
      renderFun: .plot
...
